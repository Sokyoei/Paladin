name: Mirror to Codeberg

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # Every day at midnight

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      # 完整拉取所有分支、标签，不浅克隆
      - name: Full checkout all refs
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # 加载 SSH 私钥连接 Codeberg
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.CODEBERG_SSH_PRIV }}

      # 信任 Codeberg 主机
      - name: Trust codeberg.org
        run: ssh-keyscan codeberg.org >> ~/.ssh/known_hosts

      # 全量镜像推送，两边严格一致
      - name: Mirror push to Codeberg
        run: |
          git remote add codeberg git@codeberg.org:Sokyoei/Paladin.git || true
          git push --mirror codeberg
